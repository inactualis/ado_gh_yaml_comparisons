name: Deploy App Services
description: Deploy a package to one or more Azure App Services from a JSON list.

inputs:
  environment_name:
    description: Environment name for logging and environment binding
    required: true
  is_prod:
    description: Whether this deployment is production
    required: true
  resource_group:
    description: Azure resource group containing the App Services
    required: true
  artifact_path:
    description: Folder containing the downloaded artifact
    required: false
    default: artifact
  package_path:
    description: Package path relative to the artifact folder
    required: false
    default: app.zip
  app_services_json:
    description: JSON array of app services, e.g. [{"name":"app1"},{"name":"app2"}]
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ENVIRONMENT_NAME: ${{ inputs.environment_name }}
        IS_PROD: ${{ inputs.is_prod }}
        RESOURCE_GROUP: ${{ inputs.resource_group }}
        ARTIFACT_PATH: ${{ inputs.artifact_path }}
        PACKAGE_PATH: ${{ inputs.package_path }}
        APP_SERVICES_JSON: ${{ inputs.app_services_json }}
      run: |
        set -euo pipefail

        package_file="${ARTIFACT_PATH}/${PACKAGE_PATH}"

        echo "Deploying to ${ENVIRONMENT_NAME} using package ${package_file}"

        echo "${APP_SERVICES_JSON}" | jq -c '.[]' | while read -r service; do
          app_name="$(echo "${service}" | jq -r '.name')"

          echo "Deploying ${app_name}"

          if [ "${IS_PROD}" = "true" ]; then
            az webapp deploy \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${app_name}" \
              --src-path "${package_file}" \
              --type zip \
              --async false
          else
            az webapp deployment source config-zip \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${app_name}" \
              --src "${package_file}"
          fi
        done
